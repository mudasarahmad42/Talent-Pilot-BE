<text x="152" y="1687" class="box-title" fill="white">1. JD Draft</text>
<text x="152" y="1738" class="body" fill="#172033">Intake fields -&gt; Ollama draft -&gt; human edits -&gt; AiAgentRuns logs metadata.</text>
