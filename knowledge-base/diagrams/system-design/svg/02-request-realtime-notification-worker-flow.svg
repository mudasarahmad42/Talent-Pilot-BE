<svg xmlns="http://www.w3.org/2000/svg" width="3300" height="2000" viewBox="0 0 3300 2000" role="img" aria-labelledby="title desc">
<title id="title">Talent Pilot Request, Realtime, and Worker Flow</title>
<desc id="desc">Expanded sequence flow through HTTP, SQL transaction, SignalR, durable outbox, and email delivery</desc>
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L0,8 L10,4 z" fill="#536273" />
  </marker>
  <style>
    svg { background: #F6F8FB; }
    text { font-family: "Segoe UI", Arial, sans-serif; dominant-baseline: alphabetic; }
    .title { font-size: 45px; font-weight: 760; letter-spacing: 0; }
    .subtitle { font-size: 21px; font-weight: 450; }
    .tag { font-size: 15px; font-weight: 650; }
    .section-title { font-size: 24px; font-weight: 760; fill: #172033; }
    .box-title { font-size: 18px; font-weight: 760; }
    .body { font-size: 16px; fill: #172033; }
    .label { font-size: 15px; font-weight: 760; }
    .tiny { font-size: 14px; }
    .table-field { font-size: 15px; fill: #172033; }
    .section { stroke-width: 1.8; }
    .box { stroke-width: 1.5; filter: drop-shadow(0 2px 2px rgba(23,32,51,.08)); }
  </style>
</defs>
<rect x="0" y="0" width="3300" height="130" rx="0" fill="#263C55" />
<text x="58" y="58" class="title" fill="white">Talent Pilot Request, Realtime, and Worker Flow</text>
<text x="60" y="96" class="subtitle" fill="#D6E0EA">Expanded sequence flow through HTTP, SQL transaction, SignalR, durable outbox, and email delivery</text>
